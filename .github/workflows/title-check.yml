name: title-check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  title-check:
    runs-on: ubuntu-latest
    steps:
      - name: title-check
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          node -e "require('node:assert/strict').match(process.env.TITLE, /^V12: /u)"
